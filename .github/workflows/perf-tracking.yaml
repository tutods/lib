name: Performance Tracking

on:
  workflow_run:
    workflows: ['Code Check', 'Conventional Commit (PR title)', 'Release PR', 'Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to analyze'
        required: false
        default: '7'
        type: choice
        options:
          - 1
          - 7
          - 30
          - 90

permissions:
  actions: read
  contents: write

jobs:
  track-performance:
    name: 📊 Track Performance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: 📊 Collect workflow metrics
        id: metrics
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          DAYS: ${{ inputs.days || '7' }}
        run: |
          set -e

          # Create perf directory if it doesn't exist
          mkdir -p .github/perf

          # Initialize or load metrics file
          METRICS_FILE=".github/perf/metrics.json"
          if [ -f "$METRICS_FILE" ]; then
            CURRENT_DATA=$(cat "$METRICS_FILE")
          else
            CURRENT_DATA='{"workflows":{}}'
          fi

          # Get workflow run details
          if [ -n "$WORKFLOW_RUN_ID" ]; then
            echo "Fetching data for workflow run: $WORKFLOW_RUN_ID"

            # Get workflow run details
            RUN_DATA=$(gh api "repos/{owner}/{repo}/actions/runs/$WORKFLOW_RUN_ID")

            WORKFLOW_NAME=$(echo "$RUN_DATA" | jq -r '.name')
            STATUS=$(echo "$RUN_DATA" | jq -r '.conclusion // .status')
            DURATION_MS=$(echo "$RUN_DATA" | jq -r '.run_duration_ms // 0')
            CREATED_AT=$(echo "$RUN_DATA" | jq -r '.created_at')
            EVENT=$(echo "$RUN_DATA" | jq -r '.event')

            # Convert to seconds
            DURATION_SEC=$(echo "scale=2; $DURATION_MS / 1000" | bc)

            # Get date key
            DATE_KEY=$(date -d "$CREATED_AT" +%Y-%m-%d 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$CREATED_AT" +%Y-%m-%d)

            echo "Workflow: $WORKFLOW_NAME"
            echo "Status: $STATUS"
            echo "Duration: ${DURATION_SEC}s"
            echo "Date: $DATE_KEY"

            # Update metrics JSON
            UPDATED_DATA=$(echo "$CURRENT_DATA" | jq --arg workflow "$WORKFLOW_NAME" \
              --arg date "$DATE_KEY" \
              --arg status "$STATUS" \
              --arg duration "$DURATION_SEC" \
              --arg event "$EVENT" \
              '
                .workflows[$workflow] //= {
                  runs: [],
                  total_runs: 0,
                  successful_runs: 0,
                  failed_runs: 0,
                  avg_duration_sec: 0
                }
                | .workflows[$workflow].runs += [{
                  date: $date,
                  status: $status,
                  duration_sec: ($duration | tonumber),
                  event: $event
                }]
                | .workflows[$workflow].total_runs += 1
                | (.workflows[$workflow].successful_runs += 1 | .) if $status == "success" else .
                | (.workflows[$workflow].failed_runs += 1 | .) if $status == "failure" else .
                | .workflows[$workflow].avg_duration_sec = ((.workflows[$workflow].avg_duration_sec * (.workflows[$workflow].total_runs - 1)) + ($duration | tonumber)) / .workflows[$workflow].total_runs
              ')

            # Save updated metrics
            echo "$UPDATED_DATA" | jq '.' > "$METRICS_FILE"

            # Output summary
            SUCCESS_RATE=$(echo "$UPDATED_DATA" | jq -r ".workflows[$workflow].successful_runs / .workflows[$workflow].total_runs * 100")
            echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
            echo "avg_duration=$(echo "$UPDATED_DATA" | jq -r ".workflows[$workflow].avg_duration_sec")" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Commit metrics data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/perf/metrics.json
          git diff --staged --quiet || git commit -m "chore(perf): update workflow performance metrics [skip ci]"
          git push

      - name: 📈 Performance Summary
        if: github.event_name == 'workflow_run'
        run: |
          if [ -n "${{ steps.metrics.outputs.success_rate }}" ]; then
            echo "### 📊 Performance Metrics" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Success Rate | ${{ steps.metrics.outputs.success_rate }}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Avg Duration | ${{ steps.metrics.outputs.avg_duration }}s |" >> $GITHUB_STEP_SUMMARY
          fi

  generate-dashboard:
    name: 🎨 Generate Dashboard
    needs: track-performance
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: 📊 Generate dashboard HTML
        run: |
          cat > docs/perf-dashboard.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>CI/CD Performance Dashboard</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
              }
              .container {
                max-width: 1200px;
                margin: 0 auto;
                background: white;
                border-radius: 12px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                padding: 30px;
              }
              h1 {
                color: #333;
                margin-bottom: 10px;
                font-size: 28px;
              }
              .subtitle {
                color: #666;
                margin-bottom: 30px;
                font-size: 14px;
              }
              .metrics-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
              }
              .metric-card {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
              }
              .metric-card h3 {
                font-size: 14px;
                opacity: 0.9;
                margin-bottom: 10px;
              }
              .metric-card .value {
                font-size: 32px;
                font-weight: bold;
              }
              .metric-card .label {
                font-size: 12px;
                opacity: 0.8;
                margin-top: 5px;
              }
              table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 20px;
              }
              th, td {
                padding: 12px;
                text-align: left;
                border-bottom: 1px solid #eee;
              }
              th {
                background: #f8f9fa;
                font-weight: 600;
                color: #333;
              }
              tr:hover {
                background: #f8f9fa;
              }
              .status-success {
                color: #28a745;
                font-weight: 600;
              }
              .status-failure {
                color: #dc3545;
                font-weight: 600;
              }
              .loading {
                text-align: center;
                padding: 40px;
                color: #666;
              }
              .last-updated {
                text-align: right;
                color: #999;
                font-size: 12px;
                margin-top: 20px;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🚀 CI/CD Performance Dashboard</h1>
              <p class="subtitle">Real-time workflow performance metrics and trends</p>

              <div class="metrics-grid" id="metrics-grid">
                <div class="loading">Loading metrics...</div>
              </div>

              <div id="workflow-details"></div>

              <p class="last-updated" id="last-updated"></p>
            </div>

            <script>
              async function loadMetrics() {
                try {
                  const response = await fetch('.github/perf/metrics.json');
                  const data = await response.json();

                  displayMetrics(data);
                } catch (error) {
                  console.error('Failed to load metrics:', error);
                  document.getElementById('metrics-grid').innerHTML =
                    '<div class="loading">❌ Failed to load metrics</div>';
                }
              }

              function displayMetrics(data) {
                const workflows = data.workflows || {};
                const workflowNames = Object.keys(workflows);

                if (workflowNames.length === 0) {
                  document.getElementById('metrics-grid').innerHTML =
                    '<div class="loading">No metrics available yet</div>';
                  return;
                }

                // Calculate overall stats
                let totalRuns = 0;
                let totalSuccess = 0;
                let totalDuration = 0;
                let workflowCount = 0;

                workflowNames.forEach(name => {
                  const wf = workflows[name];
                  totalRuns += wf.total_runs || 0;
                  totalSuccess += wf.successful_runs || 0;
                  totalDuration += (wf.avg_duration_sec || 0) * (wf.total_runs || 0);
                  workflowCount++;
                });

                const overallSuccessRate = totalRuns > 0 ? ((totalSuccess / totalRuns) * 100).toFixed(1) : 0;
                const overallAvgDuration = totalRuns > 0 ? (totalDuration / totalRuns).toFixed(1) : 0;

                // Display metrics cards
                document.getElementById('metrics-grid').innerHTML = `
                  <div class="metric-card">
                    <h3>📊 Total Workflows</h3>
                    <div class="value">${workflowCount}</div>
                    <div class="label">Active workflows</div>
                  </div>
                  <div class="metric-card">
                    <h3>✅ Overall Success Rate</h3>
                    <div class="value">${overallSuccessRate}%</div>
                    <div class="label">${totalSuccess} of ${totalRuns} runs</div>
                  </div>
                  <div class="metric-card">
                    <h3>⚡ Avg Duration</h3>
                    <div class="value">${overallAvgDuration}s</div>
                    <div class="label">Across all workflows</div>
                  </div>
                  <div class="metric-card">
                    <h3>🔄 Total Runs</h3>
                    <div class="value">${totalRuns}</div>
                    <div class="label">All time</div>
                  </div>
                `;

                // Display workflow details table
                let tableHTML = `
                  <h2 style="margin-top: 40px; margin-bottom: 20px; color: #333;">Workflow Details</h2>
                  <table>
                    <thead>
                      <tr>
                        <th>Workflow</th>
                        <th>Total Runs</th>
                        <th>Success Rate</th>
                        <th>Avg Duration</th>
                        <th>Last Status</th>
                      </tr>
                    </thead>
                    <tbody>
                `;

                workflowNames.forEach(name => {
                  const wf = workflows[name];
                  const successRate = wf.total_runs > 0
                    ? ((wf.successful_runs / wf.total_runs) * 100).toFixed(1)
                    : 0;
                  const lastRun = wf.runs && wf.runs.length > 0 ? wf.runs[wf.runs.length - 1] : null;
                  const lastStatus = lastRun ? lastRun.status : 'N/A';
                  const statusClass = lastStatus === 'success' ? 'status-success' :
                                     lastStatus === 'failure' ? 'status-failure' : '';

                  tableHTML += `
                    <tr>
                      <td><strong>${name}</strong></td>
                      <td>${wf.total_runs || 0}</td>
                      <td>${successRate}%</td>
                      <td>${(wf.avg_duration_sec || 0).toFixed(1)}s</td>
                      <td class="${statusClass}">${lastStatus}</td>
                    </tr>
                  `;
                });

                tableHTML += `
                    </tbody>
                  </table>
                `;

                document.getElementById('workflow-details').innerHTML = tableHTML;
                document.getElementById('last-updated').textContent =
                  `Last updated: ${new Date().toLocaleString()}`;
              }

              loadMetrics();
              setInterval(loadMetrics, 60000); // Refresh every minute
            </script>
          </body>
          </html>
          EOF

      - name: 📤 Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/perf-dashboard.html
          git diff --staged --quiet || git commit -m "chore(perf): update performance dashboard [skip ci]"
          git push

      - name: 🔗 View Dashboard
        run: |
          echo "### 🎨 Dashboard Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View the live dashboard at:" >> $GITHUB_STEP_SUMMARY
          echo "https://tutods.github.io/lib/perf-dashboard.html" >> $GITHUB_STEP_SUMMARY
