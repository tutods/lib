name: NX Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "configs/**"

permissions:
  actions: write
  contents: write
  pull-requests: write

env:
  GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

jobs:
  release:
    name: 🚀 Create Release PR
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[no ci]')
    steps:
      - name: 🦖 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1

      - name: 🔻 Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: 🏃 Setup project
        uses: ./.github/actions/setup-project

      - name: 🎯 Sets the base and head SHAs for the nx affected commands in CI
        uses: nrwl/nx-set-shas@v5

      - name: 🔨 Build affected libs
        run: npx nx affected -t build

      - name: 🚀 Run nx release (version only)
        id: nx-release
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npx nx release --skip-publish
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 📋 Create Release Pull Request
        if: steps.nx-release.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "chore(release): version packages [no ci]"
          branch: release/auto-version-bump
          base: main
          title: "chore(release): version packages"
          body: |
            ## Automated Release 🚀

            This PR contains automated version bumps and changelog updates generated by NX.

            ### Next steps
            - Review the version changes
            - Merge this PR to trigger the publish workflow

            ---
            _Generated by GitHub Actions workflow_
          labels: |
            release
            automated
          assignees: tutods
          delete-branch: true

      - name: 🔄 Enable auto-merge
        if: steps.nx-release.outputs.has_changes == 'true'
        run: |
          sleep 5
          PR_NUMBER=$(gh pr list --head release/auto-version-bump --state open --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --auto --squash
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: ✅ Release summary
        if: steps.nx-release.outputs.has_changes == 'true'
        run: |
          echo "✅ Release PR created and set to auto-merge"
          echo "🔄 Waiting for status checks to pass before merging"

      - name: ℹ️ No changes summary
        if: steps.nx-release.outputs.has_changes == 'false'
        run: echo "ℹ️ No changes detected - skipping release"
