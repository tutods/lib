name: Release PR

on:
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "configs/**"
  workflow_dispatch: {}

concurrency:
  group: release-pr
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  NX_DAEMON: false
  NX_REJECT_UNKNOWN_LOCAL_CACHE: 0
  LEFTHOOK: "0"

jobs:
  # ─── CREATE RELEASE PR ────────────────────────────────────────────────────────
  # Runs nx release --skip-publish on every push to main that is NOT the NX
  # release commit itself. Uses conventional commits to determine which packages
  # bump and by how much, then force-pushes to release/next and creates/updates
  # a PR targeting main.
  # No-op when there are no new conventional commits since the last release tags.
  # Tags are NOT created here — release.yml creates them after the PR is merged.
  create-release-pr:
    name: Version and Create Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip when:
    # 1. The release PR (release/next → main) is being merged (contains 'release/next')
    # 2. It's an NX release commit (contains '[release]')
    if: |
      !contains(github.event.head_commit.message, 'release/next') &&
      !contains(github.event.head_commit.message, '[release]')

    steps:
      - name: 📥 Checkout (full history for conventional commits)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: 💾 Cache git objects
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: .git/objects
          key: git-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            git-${{ runner.os }}-

      - name: 🏷️ Fetch all tags
        run: git fetch --tags --force

      - name: 🔧 Setup Node and install dependencies
        uses: ./.github/actions/node-setup-and-install

      - name: ✍️ Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🚀 Run NX version bump and generate changelogs
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BEFORE=$(git rev-parse HEAD)
          pnpm exec nx release --skip-publish --verbose 2>&1 | tee /tmp/version-output.txt
          AFTER=$(git rev-parse HEAD)

          if [ "$BEFORE" = "$AFTER" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No version changes detected — no releasable commits since last tags. Skipping."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 📤 Push to release/next
        if: steps.version.outputs.has_changes == 'true'
        run: git push origin HEAD:refs/heads/release/next --force

      - name: 🔨 Create or update Release PR
        if: steps.version.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          branch: release/next
          base: main
          title: "chore(release): version packages"
          body: |
            ## Automated Release 🚀

            This PR contains automated version bumps and changelog updates generated by NX.

            ### 📦 Version Changes
            <!-- Check the diff below for specific version bumps -->

            ### ✅ Next Steps
            - Review the changelog entries in each package's CHANGELOG.md
            - Wait for all status checks to pass
            - Merge this PR to trigger the publish workflow

            ---
            _Generated by GitHub Actions workflow_
          labels: |
            release
            automated
          assignees: tutods
          delete-branch: false
