name: Migrate Tags

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "migrate" to confirm tag migration'
        required: true
        type: string
        default: ''

permissions:
  contents: write
  id-token: write
  workflows: write

env:
  NX_DAEMON: false
  NX_REJECT_UNKNOWN_LOCAL_CACHE: 0
  LEFTHOOK: "0"

jobs:
  migrate:
    name: 🔄 Migrate Tags
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: github.event.inputs.confirm == 'migrate'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: 💾 Cache git objects
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: .git/objects
          key: git-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            git-${{ runner.os }}-

      - name: 🏷️ Fetch all tags
        run: git fetch --tags --force

      - name: 🔧 Setup git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📦 Install jq
        run: sudo apt-get install -y jq

      - name: 🔄 Run migration script
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: .github/scripts/migrate-tags.sh

      - name: ✅ Summary
        run: |
          echo "### 🎉 Migration Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tags have been migrated from \`release/{name}/{version}\` to \`{name}@{version}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### What changed:" >> $GITHUB_STEP_SUMMARY
          echo "- Deleted old git tags" >> $GITHUB_STEP_SUMMARY
          echo "- Created new git tags with the new pattern" >> $GITHUB_STEP_SUMMARY
          echo "- Migrated GitHub releases to use the new tags" >> $GITHUB_STEP_SUMMARY
