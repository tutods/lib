name: "Setup Node and PNPM and Install Dependencies"

description: >
  Installs PNPM and Node.js, restores the node_modules cache, then installs
  dependencies from npm registry.

runs:
  using: "composite"

  steps:
    - name: 📦 Install PNPM
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      # Reads packageManager field from package.json — pnpm@10.33.0

    - name: 🟢 Install Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version-file: ".nvmrc"
        cache: 'pnpm'  # Caches pnpm store globally — shared across all jobs

    # Cache node_modules keyed on OS + lockfile — the only cache needed.
    # No restore-keys: a partially wrong node_modules is worse than a miss.
    - name: 💾 Cache node_modules
      id: cache-node-modules
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          node_modules
          packages/*/node_modules
          apps/*/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('.nvmrc', 'pnpm-lock.yaml') }}

    - name: 📥 Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: 💾 Cache NX computation cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          .nx/cache
          node_modules/.cache
        # run_id makes the key unique per run so each run saves its updated NX
        # task results. restore-keys fall back to the most recent cache for the
        # same lockfile, letting NX decide internally which tasks are still valid.
        key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.run_id }}
        restore-keys: |
          nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
          nx-${{ runner.os }}-
